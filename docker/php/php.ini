; ── ÉCLAT API — PHP runtime configuration ──────────────────────────────────

memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60
max_input_time = 60

; Timezone (matches APP_TIMEZONE in .env)
date.timezone = Asia/Jakarta

; OPcache (enabled for both dev & prod; revalidate_freq=0 + validate_timestamps
; is fine for dev since files are bind-mounted, and gets overridden by
; opcache.validate_timestamps=0 in production builds if desired)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Error handling — display_errors is controlled by Laravel's APP_DEBUG,
; but keep this off at the PHP level so raw PHP errors never leak in prod.
display_errors = Off
log_errors = On

; Realpath cache (perf)
realpath_cache_size = 4096K
realpath_cache_ttl = 600
